# fly.toml app configuration file generated for bac-tech-2026 on 2026-07-14T20:19:43Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bac-tech-2026'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

[[metrics]]
  port = 8080
  path = '/'
